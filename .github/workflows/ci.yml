name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
          - os: ubuntu-latest
            name: Linux
          - os: windows-latest
            name: Windows
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      # Default ubuntu-latest runners ship with ~14 GB free, which a
      # full Rust build of MAKI (default features + `--features ai`,
      # plus cache restore landing a fat `target/`) can exhaust —
      # observed as `IOException: No space left on device` during the
      # cache restore step on Linux. Purge pre-installed tooling we
      # don't need to free ~25 GB. Conservative defaults: keep the
      # tool-cache (node/python may be touched by transitive deps)
      # and swap storage; drop the OS-bundled Android/.NET/Haskell
      # stacks and the cached Docker images.
      - name: Free disk space (Linux only)
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build

      - name: Run unit tests
        run: cargo test --lib

      - name: Run integration tests
        run: cargo test --test cli

      - name: Build with AI features
        run: cargo build --features ai

      - name: Run unit tests with AI features
        run: cargo test --lib --features ai

      - name: Run integration tests with AI features
        run: cargo test --test cli --features ai

  # Validate dependency licenses and check for security advisories.
  # Runs only on Linux since the dep tree is platform-independent.
  licenses:
    runs-on: ubuntu-latest
    name: License & advisory check
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Run cargo deny check
        run: cargo deny check
