# Configuration for cargo-about — generates THIRD_PARTY_LICENSES.md
#
# Run: cargo about generate -o THIRD_PARTY_LICENSES.md about.hbs

# License IDs accepted for dependencies. Anything outside this list causes
# `cargo about` to fail, forcing a conscious decision before adding a crate
# with an unfamiliar license.
accepted = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "NCSA",          # University of Illinois/NCSA — permissive, similar to MIT
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",       # Boost Software License
    "ISC",
    "Unicode-3.0",   # Unicode license used by some text crates
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",       # weak copyleft, file-level — OK for linked libs
    "OpenSSL",
    "CC0-1.0",       # public domain dedication
    "0BSD",
]

# Treat any source other than crates.io as needing explicit acceptance.
# (cargo-about will warn if a git dep is encountered.)
