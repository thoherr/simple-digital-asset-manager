<div class="date-section">
    <div class="date-display" id="date-display-{{ asset_id }}">
        <span class="date-text">{{ created_at }}</span>
        <button class="edit-pencil"
                onclick="var d=document.getElementById('date-display-{{ asset_id }}'),e=document.getElementById('date-edit-{{ asset_id }}');d.style.display='none';e.style.display='block';e.querySelector('input').focus();"
                title="Edit date">&#9998;</button>
    </div>
    <div class="date-edit" id="date-edit-{{ asset_id }}" style="display:none;">
        <form hx-put="/api/asset/{{ asset_id }}/date"
              hx-target="#date"
              hx-swap="innerHTML">
            <input type="date" name="date" value="{{ created_at }}" style="font:inherit;">
            <div style="margin-top:0.3rem;">
                <button type="submit">Save</button>
                <button type="button" onclick="document.getElementById('date-edit-{{ asset_id }}').style.display='none';document.getElementById('date-display-{{ asset_id }}').style.display='block';">Cancel</button>
            </div>
        </form>
    </div>
</div>
