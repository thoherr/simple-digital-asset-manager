<div class="description-section">
    <div class="description-display" id="desc-display-{{ asset_id }}">
        {% match description %}
        {% when Some with (desc) %}
        <span class="description-text">{{ desc }}</span>
        {% when None %}
        <span class="description-text" style="color: var(--text-muted); font-style: italic;">No description</span>
        {% endmatch %}
        <button class="edit-pencil"
                onclick="var d=document.getElementById('desc-display-{{ asset_id }}'),e=document.getElementById('desc-edit-{{ asset_id }}');d.style.display='none';e.style.display='block';e.querySelector('textarea').focus();"
                title="Edit description">&#9998;</button>
    </div>
    <div class="description-edit" id="desc-edit-{{ asset_id }}" style="display:none;">
        <form hx-put="/api/asset/{{ asset_id }}/description"
              hx-target="#description"
              hx-swap="innerHTML">
            <textarea name="description" rows="3" style="width:100%;box-sizing:border-box;">{% match description %}{% when Some with (desc) %}{{ desc }}{% when None %}{% endmatch %}</textarea>
            <div style="margin-top:0.3rem;">
                <button type="submit">Save</button>
                <button type="button" onclick="document.getElementById('desc-edit-{{ asset_id }}').style.display='none';document.getElementById('desc-display-{{ asset_id }}').style.display='block';">Cancel</button>
            </div>
        </form>
    </div>
</div>
