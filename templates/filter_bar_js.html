<!--
    Browse filter bar JS — included once from `browse.html`.

    Owns the chip-based tag picker, the path autocomplete, the multi-select
    format dropdown, the rating/label widgets, and the dispatcher that
    translates user actions back into URL query parameters. Exposes
    `window.toggleFormatFilter`, `window.setVolumeFilterById`,
    `window.addQueryTerm`, `window.triggerSearch` for the facet-sidebar
    click handlers and other modules to call into.
-->
<script>
// --- Shared filter bar logic ---
// Requires: onFilterChange() defined before this script
(function() {
    var allTags = [];
    var initialTagStr = "{{ tag|js_string|safe }}";

    function fetchTags() {
        fetch('/api/tags')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                allTags = data.map(function(t) { return t[0]; });
            });
    }

    function tagToDisplay(t) { return t; }
    function tagToStorage(t) { return t.replace(/>/g, '|'); }

    function getSelectedTags() {
        var chips = document.querySelectorAll('#tag-chips .tag-chip');
        var tags = [];
        chips.forEach(function(c) { tags.push(c.getAttribute('data-tag')); });
        return tags;
    }

    // Rebuild the chip's `data-tag` attribute from its name + toggle state.
    // Mode is tri-state: "desc" (default, include descendants), "path"
    // (whole-path match, `=`), or "exact" (leaf-only at any level, `/`).
    // Case-sensitivity toggles orthogonally via `^`.
    function updateChipDataTag(chip, name) {
        var mode = chip.getAttribute('data-mode') || 'desc';
        var caseSensitive = chip.getAttribute('data-case') === '1';
        var modePrefix = (mode === 'path') ? '=' : (mode === 'exact') ? '/' : '';
        var prefix = modePrefix + (caseSensitive ? '^' : '');
        chip.setAttribute('data-tag', prefix + name);
    }

    // Strip `=`, `/`, and `^` prefix markers from a raw tag name (user may
    // type them manually in the input field).
    function stripTagPrefixes(raw) {
        var mode = 'desc', caseSensitive = false, name = raw;
        var changed = true;
        while (changed) {
            changed = false;
            if (name.charAt(0) === '=') { mode = 'path'; name = name.substring(1); changed = true; }
            else if (name.charAt(0) === '/') { mode = 'exact'; name = name.substring(1); changed = true; }
            else if (name.charAt(0) === '^') { caseSensitive = true; name = name.substring(1); changed = true; }
        }
        return { name: name, mode: mode, caseSensitive: caseSensitive };
    }

    function addTag(raw) {
        raw = raw.trim();
        if (!raw) return;
        var parsed = stripTagPrefixes(raw);
        var name = parsed.name;
        if (!name) return;

        // Reject any chip that already has this tag name regardless of modifiers
        var existingNames = [];
        document.querySelectorAll('#tag-chips .tag-chip').forEach(function(c) {
            var n = c.getAttribute('data-name');
            if (n) existingNames.push(n);
        });
        if (existingNames.indexOf(name) !== -1) return;

        var chip = document.createElement('span');
        chip.className = 'tag-chip';
        chip.setAttribute('data-name', name);
        chip.setAttribute('data-mode', parsed.mode);
        chip.setAttribute('data-case', parsed.caseSensitive ? '1' : '0');
        updateChipDataTag(chip, name);

        var label = document.createElement('span');
        label.textContent = tagToDisplay(name);
        chip.appendChild(label);

        // Mode toggle cycles through three states. `=` (whole-path) comes
        // first after the default because it's the more useful narrow mode —
        // matches the tag value exactly, ignoring same-named leaves elsewhere
        // in the hierarchy. `/` (leaf-only) is a niche second click.
        //   ▼ (default) — include descendants, match at any level
        //   =           — whole path match (exact tag value only; disambiguates
        //                 a root-level tag from same-named leaves in a hierarchy)
        //   /           — leaf only at any level (no descendants in branch)
        var modeToggle = document.createElement('button');
        modeToggle.type = 'button';
        modeToggle.className = 'tag-mode-toggle';
        function renderMode() {
            var mode = chip.getAttribute('data-mode') || 'desc';
            if (mode === 'path') {
                modeToggle.textContent = '=';
                modeToggle.title = 'Whole-path match (exact tag value only) — click for leaf-only';
            } else if (mode === 'exact') {
                modeToggle.textContent = '/';
                modeToggle.title = 'Leaf only at any level — click to include descendants';
            } else {
                modeToggle.textContent = '\u25BC';
                modeToggle.title = 'Including descendants — click for whole-path match';
            }
        }
        renderMode();
        modeToggle.onclick = function() {
            // Cycle: desc → path (=) → exact (/) → desc
            var mode = chip.getAttribute('data-mode') || 'desc';
            var next = (mode === 'desc') ? 'path' : (mode === 'path') ? 'exact' : 'desc';
            chip.setAttribute('data-mode', next);
            updateChipDataTag(chip, name);
            renderMode();
            onFilterChange();
        };
        chip.appendChild(modeToggle);

        // Case-sensitivity toggle: cc (insensitive, default) / Cc (sensitive)
        var caseToggle = document.createElement('button');
        caseToggle.type = 'button';
        caseToggle.className = 'tag-case-toggle';
        function renderCase() {
            var cs = chip.getAttribute('data-case') === '1';
            caseToggle.textContent = cs ? 'Cc' : 'cc';
            caseToggle.classList.toggle('active', cs);
            caseToggle.title = cs
                ? 'Case-sensitive (click for case-insensitive)'
                : 'Case-insensitive (click for case-sensitive)';
        }
        renderCase();
        caseToggle.onclick = function() {
            var cs = chip.getAttribute('data-case') === '1';
            chip.setAttribute('data-case', cs ? '0' : '1');
            updateChipDataTag(chip, name);
            renderCase();
            onFilterChange();
        };
        chip.appendChild(caseToggle);

        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'remove-tag';
        btn.innerHTML = '&times;';
        btn.onclick = function() {
            chip.remove();
            onFilterChange();
        };
        chip.appendChild(btn);

        document.getElementById('tag-chips').appendChild(chip);
        document.getElementById('tag-input').value = '';
        hideAutocomplete();
    }

    function addTagAndSearch(name) {
        addTag(name);
        onFilterChange();
    }

    var acIndex = -1;

    function showSuggestions(query) {
        var ac = document.getElementById('tag-autocomplete');
        var selected = getSelectedTags();
        query = query.toLowerCase();
        // A leading `|` anchors the search to a hierarchy component boundary —
        // matches tag components that START with the rest of the query at any
        // level (root or after a `|`). Useful when a substring like "ken" or
        // "nen" appears in many words and you want to narrow to ones that
        // begin with that letter combination.
        var anchored = false;
        if (query.charAt(0) === '|') {
            anchored = true;
            query = query.substring(1);
        }
        var queryStorage = query.replace(/>/g, '|');

        function tagMatches(tl) {
            if (anchored) {
                // Match if any hierarchy component starts with the query
                return tl.indexOf('|' + query) !== -1 || tl.indexOf('|' + queryStorage) !== -1
                    || tl.indexOf(query) === 0 || tl.indexOf(queryStorage) === 0;
            }
            return tl.indexOf(query) !== -1 || tl.indexOf(queryStorage) !== -1;
        }

        var rawMatches = allTags.filter(function(t) {
            return tagMatches(t.toLowerCase()) && selected.indexOf(t) === -1;
        });

        // Pre-compute hasChild once per match (was O(n^2) inside the filter).
        var rawSet = {};
        rawMatches.forEach(function(t) { rawSet[t] = true; });
        function hasChildIn(t) {
            var prefix = t + '|';
            for (var i = 0; i < rawMatches.length; i++) {
                if (rawMatches[i].indexOf(prefix) === 0) return true;
            }
            return false;
        }

        // Filter: keep leaves (no descendants in the result set) AND keep
        // intermediate hierarchy levels whose own name (any component) matches
        // the query. Without the second clause, searching "subject" with both
        // `subject|nature` and `subject|nature|landscape` in the catalog would
        // hide `subject|nature` even though it's a real catalog tag the user
        // may want to filter on directly. Anchored mode requires the component
        // to *start with* the query (stricter); non-anchored allows substring.
        var matches = rawMatches.filter(function(t) {
            if (!hasChildIn(t)) return true;
            var components = t.toLowerCase().split('|');
            return components.some(function(c) {
                if (anchored) {
                    return c.indexOf(query) === 0 || c.indexOf(queryStorage) === 0;
                }
                return c.indexOf(query) !== -1 || c.indexOf(queryStorage) !== -1;
            });
        });

        // Sort so leaves of matched paths appear after their parent (when both
        // are kept), and shorter paths appear first within each group. Cap at
        // 12 (was 10) to leave a little room for the now-included middle nodes.
        matches.sort(function(a, b) {
            var ad = a.split('|').length;
            var bd = b.split('|').length;
            if (ad !== bd) return ad - bd;
            return a.localeCompare(b);
        });
        matches = matches.slice(0, 12);

        if (matches.length === 0) {
            ac.style.display = 'none';
            acIndex = -1;
            return;
        }

        ac.innerHTML = '';
        acIndex = -1;
        matches.forEach(function(t) {
            var div = document.createElement('div');
            div.className = 'tag-suggestion';
            div.setAttribute('data-tag', t);
            var parts = t.split('|');
            if (parts.length > 1) {
                var prefix = parts.slice(0, -1).join('|') + '|';
                // Prefix span is a drill-in affordance: clicking it scopes the
                // autocomplete to that sub-hierarchy by replacing the input
                // with `|<prefix>` and re-querying. The leaf portion (and the
                // gaps around the spans) still selects the whole tag.
                var prefixSpan = document.createElement('span');
                prefixSpan.className = 'tag-path-prefix';
                prefixSpan.textContent = prefix;
                prefixSpan.title = 'Drill into ' + prefix + '… (click leaf name to select tag)';
                prefixSpan.style.cursor = 'pointer';
                prefixSpan.onmousedown = function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    var input = document.querySelector('.tag-filter-input');
                    if (!input) return;
                    input.value = '|' + prefix;
                    input.focus();
                    showSuggestions(input.value);
                };
                var leafSpan = document.createElement('span');
                leafSpan.textContent = parts[parts.length - 1];
                div.appendChild(prefixSpan);
                div.appendChild(leafSpan);
            } else {
                div.textContent = t;
            }
            div.onmousedown = function(e) {
                e.preventDefault();
                addTagAndSearch(t);
            };
            ac.appendChild(div);
        });
        ac.style.display = 'block';
    }

    function highlightSuggestion(idx) {
        var ac = document.getElementById('tag-autocomplete');
        var items = ac.querySelectorAll('.tag-suggestion');
        items.forEach(function(el, i) {
            el.classList.toggle('active', i === idx);
        });
        if (idx >= 0 && items[idx]) items[idx].scrollIntoView({block: 'nearest'});
    }

    function hideAutocomplete() {
        document.getElementById('tag-autocomplete').style.display = 'none';
        acIndex = -1;
    }

    var tagInput = document.getElementById('tag-input');
    tagInput.addEventListener('input', function() {
        var val = this.value.trim();
        if (val.length > 0) { showSuggestions(val); } else { hideAutocomplete(); }
    });
    tagInput.addEventListener('keydown', function(e) {
        var ac = document.getElementById('tag-autocomplete');
        var items = ac.querySelectorAll('.tag-suggestion');
        if (e.key === 'ArrowDown' && ac.style.display === 'block') {
            e.preventDefault();
            acIndex = Math.min(acIndex + 1, items.length - 1);
            highlightSuggestion(acIndex);
        } else if (e.key === 'ArrowUp' && ac.style.display === 'block') {
            e.preventDefault();
            acIndex = Math.max(acIndex - 1, 0);
            highlightSuggestion(acIndex);
        } else if (e.key === 'Enter') {
            e.preventDefault();
            if (acIndex >= 0 && items[acIndex]) {
                addTagAndSearch(items[acIndex].getAttribute('data-tag'));
            } else {
                var val = this.value.trim();
                if (val) addTagAndSearch(val);
            }
        } else if (e.key === 'Escape') {
            hideAutocomplete();
        } else if (e.key === 'Backspace' && this.value === '') {
            var chips = document.querySelectorAll('#tag-chips .tag-chip');
            if (chips.length > 0) { chips[chips.length - 1].remove(); onFilterChange(); }
        }
        e.stopPropagation();
    });
    tagInput.addEventListener('keyup', function(e) { e.stopPropagation(); });
    tagInput.addEventListener('blur', function() { setTimeout(hideAutocomplete, 150); });
    tagInput.addEventListener('focus', function() {
        fetchTags(); // refresh tag list on focus (picks up CLI changes)
        var val = this.value.trim();
        if (val.length > 0) showSuggestions(val);
    });

    fetchTags();
    if (initialTagStr) {
        initialTagStr.split(',').forEach(function(t) {
            t = t.trim();
            if (t) addTag(t);
        });
    }

    window.damTags = {
        allTags: function() { return allTags; },
        fetchTags: fetchTags,
        tagToDisplay: tagToDisplay,
        tagToStorage: tagToStorage,
        // Exposed so external UIs (facet panel, in-grid badges, …) can
        // append a tag to the current filter and trigger a refresh
        // without duplicating the chip-build + search-rerun dance.
        addTagAndSearch: addTagAndSearch,
    };
    window.getSelectedTags = getSelectedTags;

    // --- Rating filter stars ---
    var currentRating = "{{ rating }}";
    var ratingStars = document.querySelectorAll('#rating-stars .star');
    var ratingHint = document.getElementById('rating-hint');
    var ratingUnrated = document.getElementById('rating-unrated');

    function getFilterRating() { return currentRating; }

    function setRatingFilter(value) {
        currentRating = value;
        var threshold = parseInt(value) || 0;
        ratingStars.forEach(function(s, idx) {
            var active = threshold > 0 && (idx + 1) <= threshold;
            s.className = 'star ' + (active ? 'filled' : 'empty');
            s.innerHTML = active ? '&#9733;' : '&#9734;';
        });
        if (ratingUnrated) {
            if (value === '0') { ratingUnrated.classList.add('active'); }
            else { ratingUnrated.classList.remove('active'); }
        }
        ratingHint.textContent = value || '';
    }

    ratingStars.forEach(function(s) {
        s.style.cursor = 'pointer';
        s.addEventListener('click', function() {
            var val = parseInt(this.getAttribute('data-value'));
            var exact = String(val);
            var plus = val + '+';
            var newRating;
            if (val === 5) {
                newRating = currentRating === '5' ? '' : '5';
            } else {
                if (currentRating === plus) { newRating = exact; }
                else if (currentRating === exact) { newRating = ''; }
                else { newRating = plus; }
            }
            setRatingFilter(newRating);
            onFilterChange();
        });
    });

    if (ratingUnrated) {
        ratingUnrated.style.cursor = 'pointer';
        ratingUnrated.addEventListener('click', function() {
            setRatingFilter(currentRating === '0' ? '' : '0');
            onFilterChange();
        });
    }

    window.getFilterRating = getFilterRating;
    window.setRatingFilter = setRatingFilter;

    // --- Label filter dots ---
    var currentLabel = "{{ label }}";
    var labelDots = document.querySelectorAll('#label-filter .label-dot-filter');
    var labelUnlabeled = document.getElementById('label-unlabeled');

    function getFilterLabel() { return currentLabel; }

    function setLabelFilter(value) {
        currentLabel = value;
        labelDots.forEach(function(d) {
            if (d.getAttribute('data-label') === value) { d.classList.add('active'); }
            else { d.classList.remove('active'); }
        });
        if (labelUnlabeled) {
            if (value === 'none') { labelUnlabeled.classList.add('active'); }
            else { labelUnlabeled.classList.remove('active'); }
        }
    }

    labelDots.forEach(function(d) {
        d.style.cursor = 'pointer';
        d.addEventListener('click', function() {
            var lbl = this.getAttribute('data-label');
            setLabelFilter(currentLabel === lbl ? '' : lbl);
            onFilterChange();
        });
    });

    if (labelUnlabeled) {
        labelUnlabeled.style.cursor = 'pointer';
        labelUnlabeled.addEventListener('click', function() {
            setLabelFilter(currentLabel === 'none' ? '' : 'none');
            onFilterChange();
        });
    }

    window.getFilterLabel = getFilterLabel;
    window.setLabelFilter = setLabelFilter;

    // Helper exposed for the facet panel: toggle a single format checkbox
    // and trigger a filter refresh. Treats the click as additive (multi-
    // select), matching the panel UI's own group-toggle semantics.
    window.toggleFormatFilter = function(fmt) {
        var panel = document.getElementById('format-panel');
        if (!panel) return;
        var cb = panel.querySelector('.format-cb[value="' + fmt + '"]');
        if (!cb) return;
        cb.checked = !cb.checked;
        cb.dispatchEvent(new Event('change', { bubbles: true }));
    };

    // Helper exposed for the facet panel: set the volume select to the
    // given volume id (or "" to clear) and trigger a filter refresh.
    window.setVolumeFilterById = function(volId) {
        var sel = document.querySelector('.filter-row [name=volume]');
        if (!sel) return;
        sel.value = volId || '';
        sel.dispatchEvent(new Event('change', { bubbles: true }));
    };

    // Helper exposed for the facet panel: append a `date:YYYY` (or
    // `geotagged:1`) free-text term to the search box without dropping
    // existing terms, then trigger a refresh. De-duplicates so repeated
    // clicks are no-ops.
    window.addQueryTerm = function(term) {
        var input = document.querySelector('.search-row input[name=q]');
        if (!input) return;
        var current = input.value.trim();
        var tokens = current.split(/\s+/).filter(Boolean);
        if (tokens.indexOf(term) !== -1) return;
        tokens.push(term);
        input.value = tokens.join(' ');
        onFilterChange();
    };

    // --- Format multi-select filter ---
    var fmtTrigger = document.getElementById('format-trigger');
    var fmtPanel = document.getElementById('format-panel');
    if (fmtTrigger && fmtPanel) {
        var initialFormats = "{{ format_filter }}";
        var allCbs = fmtPanel.querySelectorAll('.format-cb');
        var groupToggles = fmtPanel.querySelectorAll('.format-group-toggle');

        var groupFormats = {};
        groupToggles.forEach(function(gt) {
            var key = gt.getAttribute('data-group');
            groupFormats[key] = [];
            fmtPanel.querySelectorAll('.format-cb[data-group="' + key + '"]').forEach(function(cb) {
                groupFormats[key].push(cb);
            });
        });

        function getSelectedFormats() {
            var vals = [];
            allCbs.forEach(function(cb) { if (cb.checked) vals.push(cb.value); });
            return vals.join(',');
        }

        function updateGroupToggle(groupKey) {
            var cbs = groupFormats[groupKey];
            if (!cbs) return;
            var toggle = fmtPanel.querySelector('.format-group-toggle[data-group="' + groupKey + '"]');
            if (!toggle) return;
            var total = cbs.length;
            var checked = cbs.filter(function(c) { return c.checked; }).length;
            toggle.checked = checked === total;
            toggle.indeterminate = checked > 0 && checked < total;
        }

        function updateTriggerText() {
            var selected = [];
            allCbs.forEach(function(cb) { if (cb.checked) selected.push(cb.value); });
            if (selected.length === 0) { fmtTrigger.textContent = 'All formats'; fmtTrigger.title = ''; return; }
            var tooltip = selected.join(', ');
            if (selected.length === 1) {
                fmtTrigger.textContent = selected[0];
            } else {
                var groupLabel = null;
                for (var key in groupFormats) {
                    var cbs = groupFormats[key];
                    var allChecked = cbs.every(function(c) { return c.checked; });
                    var noneOthers = true;
                    allCbs.forEach(function(c) {
                        if (c.getAttribute('data-group') !== key && c.checked) noneOthers = false;
                    });
                    if (allChecked && noneOthers && cbs.length === selected.length) {
                        var lbl = fmtPanel.querySelector('.format-group[data-group="' + key + '"] .format-group-header');
                        if (lbl) groupLabel = lbl.textContent.trim();
                        break;
                    }
                }
                fmtTrigger.textContent = groupLabel || (selected[0] + ' +' + (selected.length - 1) + '\u2026');
            }
            fmtTrigger.title = tooltip;
        }

        if (initialFormats) {
            var initSet = initialFormats.split(',').reduce(function(m, v) { m[v] = true; return m; }, {});
            allCbs.forEach(function(cb) { if (initSet[cb.value]) cb.checked = true; });
            groupToggles.forEach(function(gt) { updateGroupToggle(gt.getAttribute('data-group')); });
            updateTriggerText();
        }

        fmtTrigger.addEventListener('click', function(e) { e.stopPropagation(); fmtPanel.classList.toggle('open'); });
        document.addEventListener('click', function(e) {
            if (!fmtPanel.contains(e.target) && e.target !== fmtTrigger) fmtPanel.classList.remove('open');
        });

        allCbs.forEach(function(cb) {
            cb.addEventListener('change', function() {
                updateGroupToggle(cb.getAttribute('data-group'));
                updateTriggerText();
                onFilterChange();
            });
        });

        groupToggles.forEach(function(gt) {
            gt.addEventListener('change', function() {
                var key = gt.getAttribute('data-group');
                groupFormats[key].forEach(function(cb) { cb.checked = gt.checked; });
                updateTriggerText();
                onFilterChange();
            });
        });

        window.damFormats = { getSelected: getSelectedFormats };
    }

    // --- Query input with debounce ---
    var qInput = document.querySelector('[name=q]');
    if (qInput) {
        var _queryTimer = null;
        qInput.addEventListener('input', function() {
            clearTimeout(_queryTimer);
            _queryTimer = setTimeout(onFilterChange, 300);
        });
        qInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { e.preventDefault(); clearTimeout(_queryTimer); onFilterChange(); }
            e.stopPropagation();
        });
        qInput.addEventListener('keyup', function(e) { e.stopPropagation(); });
    }

    // --- Dropdown auto-search ---
    document.querySelectorAll('.filter-row select').forEach(function(sel) {
        sel.addEventListener('change', onFilterChange);
    });

    // --- Path input ---
    var pathInput = document.querySelector('.filter-row [name=path]');
    if (pathInput) {
        var _pathTimer = null;
        pathInput.addEventListener('input', function() {
            clearTimeout(_pathTimer);
            _pathTimer = setTimeout(onFilterChange, 300);
        });
        pathInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { e.preventDefault(); clearTimeout(_pathTimer); onFilterChange(); }
            e.stopPropagation();
        });
        pathInput.addEventListener('keyup', function(e) { e.stopPropagation(); });
    }

    // --- People filter (chip-based, multi-select) ---
    // Mirrors the tag-chip UX: type-to-filter, ↑/↓/Enter to add a chip,
    // backspace in the empty input removes the last chip. Multiple chips
    // are AND'd in damFilterQuery (one `person:"name"` token each), matching
    // how multiple tag chips work.
    var personFilter = document.getElementById('person-filter');
    if (personFilter) {
        var personChipsEl = document.getElementById('person-chips');
        var personInput = document.getElementById('person-input');
        var personDropdown = document.getElementById('person-filter-dropdown');
        var personIdInput = document.getElementById('person-filter-id');
        var personData = [];
        try {
            var pdEl = document.getElementById('person-filter-data');
            if (pdEl && pdEl.textContent.trim()) personData = JSON.parse(pdEl.textContent);
        } catch (e) { /* empty list */ }
        var personById = {};
        var personByName = {};
        personData.forEach(function(p) { personById[p.id] = p; personByName[p.name.toLowerCase()] = p; });

        function getSelectedPeopleNames() {
            var names = [];
            personChipsEl.querySelectorAll('.person-chip').forEach(function(c) {
                names.push(c.getAttribute('data-name'));
            });
            return names;
        }

        function syncPersonHiddenInput() {
            // Sync the hidden form input so htmx posts the selection as a
            // comma-separated `person` URL param. The backend splits this
            // into multiple Vec<String> entries when parsing.
            personIdInput.value = getSelectedPeopleNames().join(',');
        }

        function addPersonChip(person) {
            // De-dupe: a person can only be in the chips once.
            var existing = getSelectedPeopleNames();
            if (existing.indexOf(person.name) !== -1) return;
            var chip = document.createElement('span');
            chip.className = 'person-chip';
            chip.setAttribute('data-id', person.id);
            chip.setAttribute('data-name', person.name);
            var label = document.createElement('span');
            label.textContent = person.name;
            chip.appendChild(label);
            var btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'remove-person';
            btn.innerHTML = '&times;';
            btn.title = 'Remove';
            btn.onclick = function() {
                chip.remove();
                syncPersonHiddenInput();
                onFilterChange();
            };
            chip.appendChild(btn);
            personChipsEl.appendChild(chip);
        }

        function addPersonAndSearch(person) {
            addPersonChip(person);
            personInput.value = '';
            closePersonDropdown();
            syncPersonHiddenInput();
            onFilterChange();
        }

        var personActiveIdx = -1;
        var personItems = [];

        function closePersonDropdown() {
            personDropdown.hidden = true;
            personDropdown.innerHTML = '';
            personActiveIdx = -1;
            personItems = [];
        }

        function renderPersonDropdown() {
            var q = personInput.value.trim().toLowerCase();
            var selected = getSelectedPeopleNames();
            var matches = personData.filter(function(p) {
                if (selected.indexOf(p.name) !== -1) return false;  // already a chip
                return q === '' || p.name.toLowerCase().indexOf(q) !== -1;
            });
            var cap = 30;
            var truncated = matches.length > cap;
            var shown = truncated ? matches.slice(0, cap) : matches;
            personItems = shown;
            personDropdown.innerHTML = '';
            if (personItems.length === 0) {
                personDropdown.hidden = true;
                return;
            }
            personItems.forEach(function(p, i) {
                var row = document.createElement('div');
                row.className = 'person-filter-option';
                row.textContent = p.name;
                row.addEventListener('mousedown', function(e) {
                    e.preventDefault();
                    addPersonAndSearch(p);
                });
                row.addEventListener('mouseenter', function() {
                    personActiveIdx = i;
                    updatePersonActive();
                });
                personDropdown.appendChild(row);
            });
            if (truncated) {
                var info = document.createElement('div');
                info.className = 'person-filter-truncated';
                info.textContent = 'Showing first ' + cap + ' of ' + matches.length + ' — keep typing to narrow.';
                personDropdown.appendChild(info);
            }
            personActiveIdx = 0;
            updatePersonActive();
            personDropdown.hidden = false;
        }

        function updatePersonActive() {
            var rows = personDropdown.querySelectorAll('.person-filter-option');
            rows.forEach(function(r, i) { r.classList.toggle('active', i === personActiveIdx); });
            var activeRow = rows[personActiveIdx];
            if (activeRow) activeRow.scrollIntoView({block: 'nearest'});
        }

        personInput.addEventListener('focus', renderPersonDropdown);
        personInput.addEventListener('input', renderPersonDropdown);
        personInput.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowDown') {
                if (personDropdown.hidden) { renderPersonDropdown(); return; }
                e.preventDefault();
                if (personItems.length === 0) return;
                personActiveIdx = Math.min(personActiveIdx + 1, personItems.length - 1);
                updatePersonActive();
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (personItems.length === 0) return;
                personActiveIdx = Math.max(personActiveIdx - 1, 0);
                updatePersonActive();
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (personActiveIdx >= 0 && personItems[personActiveIdx]) {
                    addPersonAndSearch(personItems[personActiveIdx]);
                } else {
                    // Try exact name match against the typed text.
                    var q = personInput.value.trim().toLowerCase();
                    var match = personByName[q];
                    if (match) addPersonAndSearch(match);
                }
            } else if (e.key === 'Backspace' && personInput.value === '') {
                // Remove the last chip when backspacing in empty input — same UX as tags.
                var chips = personChipsEl.querySelectorAll('.person-chip');
                if (chips.length > 0) {
                    chips[chips.length - 1].remove();
                    syncPersonHiddenInput();
                    onFilterChange();
                }
            } else if (e.key === 'Escape') {
                personInput.value = '';
                closePersonDropdown();
                personInput.blur();
            }
            e.stopPropagation();
        });
        personInput.addEventListener('blur', function() {
            setTimeout(closePersonDropdown, 120);
        });

        // Initialize chips from the URL `person` param (single value or
        // comma-separated). The hidden input arrives with the raw URL value;
        // we match each entry against name OR id (legacy shared links may
        // use either form).
        var initialPersonStr = personIdInput.value;
        if (initialPersonStr) {
            initialPersonStr.split(',').forEach(function(token) {
                token = token.trim();
                if (!token) return;
                var match = personById[token];
                if (!match) match = personByName[token.toLowerCase()];
                if (match) addPersonChip(match);
            });
            syncPersonHiddenInput();
        }

        // Expose for damFilterQuery + hx-vals.
        window.getSelectedPeople = getSelectedPeopleNames;
    } else {
        window.getSelectedPeople = function() { return []; };
    }

    // --- Default filter toggle ---
    var dfCb = document.getElementById('default-filter-cb');
    if (dfCb) {
        dfCb.addEventListener('change', onFilterChange);
    }

    // --- Filter toggle (Shift+F) ---
    var filterRow = document.getElementById('filter-row');
    var filterBtn = document.getElementById('filter-toggle');
    if (filterBtn && filterRow) {
        var hasActiveFilters = "{{ query|js_string|safe }}{{ tag|js_string|safe }}{{ rating }}{{ label }}{{ format_filter }}{{ asset_type }}{{ volume }}{{ collection }}{{ path|js_string|safe }}{{ person|js_string|safe }}".length > 0;
        var filterOpen = hasActiveFilters || localStorage.getItem('maki-filter-open') !== 'false';
        function applyFilterState() {
            if (filterOpen) {
                filterRow.style.display = '';
                filterBtn.innerHTML = '&#9650; Filters';
                filterBtn.classList.add('active');
            } else {
                filterRow.style.display = 'none';
                filterBtn.innerHTML = '&#9660; Filters';
                filterBtn.classList.remove('active');
            }
        }
        filterBtn.addEventListener('click', function() {
            filterOpen = !filterOpen;
            localStorage.setItem('maki-filter-open', filterOpen);
            applyFilterState();
        });
        applyFilterState();

        window.damFilterToggle = function() {
            filterOpen = !filterOpen;
            localStorage.setItem('maki-filter-open', filterOpen);
            applyFilterState();
        };
    }

    // Build a query string from current filter state
    window.damFilterQuery = function() {
        var parts = [];
        var qEl = document.querySelector('[name=q]');
        if (qEl && qEl.value.trim()) parts.push(qEl.value.trim());
        var tags = getSelectedTags();
        // getSelectedTags() already returns data-tag values which include any
        // `=` (exact level) and `^` (case-sensitive) prefixes per chip.
        tags.forEach(function(t) {
            // Quote only the name portion (after any =/^ prefix markers) if
            // it contains spaces. The prefixes themselves must stay outside
            // the quotes so the parser sees them.
            var prefix = '';
            var rest = t;
            while (rest.charAt(0) === '=' || rest.charAt(0) === '^') {
                prefix += rest.charAt(0);
                rest = rest.substring(1);
            }
            if (rest.indexOf(' ') !== -1) { parts.push('tag:' + prefix + '"' + rest + '"'); }
            else { parts.push('tag:' + prefix + rest); }
        });
        var r = getFilterRating();
        if (r) parts.push('rating:' + r);
        var l = getFilterLabel();
        if (l) parts.push('label:' + l);
        var typeEl = document.querySelector('.filter-row [name=type]');
        if (typeEl && typeEl.value) parts.push('type:' + typeEl.value);
        if (window.damFormats) {
            var fmt = window.damFormats.getSelected();
            if (fmt) fmt.split(',').forEach(function(f) { parts.push('format:' + f); });
        }
        var volEl = document.querySelector('.filter-row [name=volume]');
        if (volEl && volEl.value) parts.push('volume:' + volEl.value);
        var colEl = document.querySelector('.filter-row [name=collection]');
        if (colEl && colEl.value) {
            var colName = colEl.options[colEl.selectedIndex].textContent.trim();
            if (colName.indexOf(' ') !== -1) { parts.push('collection:"' + colName + '"'); }
            else { parts.push('collection:' + colName); }
        }
        // People: emit one `person:` token per chip. AND'd by the backend,
        // matching how multiple `tag:` tokens compose. Quote names that
        // contain spaces.
        var people = window.getSelectedPeople ? window.getSelectedPeople() : [];
        people.forEach(function(name) {
            if (name.indexOf(' ') !== -1) { parts.push('person:"' + name + '"'); }
            else { parts.push('person:' + name); }
        });
        var pathEl = document.querySelector('.filter-row [name=path]');
        if (pathEl && pathEl.value) {
            var pv = pathEl.value.trim();
            if (pv.indexOf(' ') !== -1) { parts.push('path:"' + pv + '"'); }
            else { parts.push('path:' + pv); }
        }
        return parts.join(' ');
    };

    // ─── Path autocomplete ──────────────────────────────────────────
    // Hierarchical completion on the path filter. Each accepted segment
    // ends in `/` so the next keystroke triggers a query for the next
    // level. Wildcard patterns (`*` anywhere in the value) suppress
    // autocomplete — the filter already understands wildcards, and
    // offering completions for a pattern would be noise.
    (function() {
        var pathInput = document.getElementById('path-input');
        var pathAc = document.getElementById('path-autocomplete');
        if (!pathInput || !pathAc) return;

        var pathAcIndex = -1;
        var debounceTimer = null;
        var lastQuery = null;

        function selectedVolumeId() {
            // The volume dropdown is a <select name="volume"> whose value
            // is a volume UUID (or "" for "all volumes"). Narrowing the
            // query by volume keeps suggestions focused and the dropdown
            // short — much more useful when a catalogue spans multiple
            // disks with overlapping folder names.
            var volEl = document.querySelector('.filter-row [name=volume]');
            return volEl && volEl.value ? volEl.value : '';
        }

        function hidePathAc() {
            pathAc.style.display = 'none';
            pathAcIndex = -1;
        }

        function renderPathSuggestions(items) {
            pathAc.innerHTML = '';
            pathAcIndex = -1;
            if (!items || items.length === 0) { hidePathAc(); return; }
            items.forEach(function(p) {
                var div = document.createElement('div');
                div.className = 'tag-suggestion';
                div.setAttribute('data-path', p);
                // Dim the prefix part (matches the tag autocomplete pattern)
                // so the eye lands on the distinguishing suffix.
                var prefix = pathInput.value;
                if (p.indexOf(prefix) === 0 && prefix.length > 0) {
                    div.innerHTML = '<span class="tag-path-prefix">' +
                        prefix.replace(/&/g,'&amp;').replace(/</g,'&lt;') +
                        '</span>' +
                        p.substring(prefix.length).replace(/&/g,'&amp;').replace(/</g,'&lt;');
                } else {
                    div.textContent = p;
                }
                div.onmousedown = function(e) {
                    e.preventDefault();
                    acceptPathSuggestion(p);
                };
                pathAc.appendChild(div);
            });
            pathAc.style.display = 'block';
        }

        function highlightPathAc(idx) {
            var items = pathAc.querySelectorAll('.tag-suggestion');
            items.forEach(function(el, i) { el.classList.toggle('active', i === idx); });
            if (idx >= 0 && items[idx]) items[idx].scrollIntoView({block: 'nearest'});
        }

        function acceptPathSuggestion(p) {
            pathInput.value = p;
            hidePathAc();
            // If accepted value ends in `/`, leave the cursor at the end
            // so the user's next keystroke continues at the next level.
            // If it's a file leaf (no trailing slash), dismiss and commit.
            if (p.slice(-1) === '/') {
                pathInput.focus();
                // Fire an input event to query the next level immediately.
                fetchPathSuggestions(p);
            } else {
                onFilterChange();
            }
        }

        function fetchPathSuggestions(prefix) {
            // Suppress autocomplete when the user is using a wildcard
            // pattern — the filter will interpret `*` itself, and
            // completions for a pattern would be misleading.
            if (prefix.indexOf('*') !== -1) { hidePathAc(); return; }
            // Tiny de-dupe: a rapid sequence of the same query (e.g. from
            // a spurious input event) shouldn't re-fetch.
            if (prefix === lastQuery) return;
            lastQuery = prefix;
            var url = '/api/paths?limit=20&q=' + encodeURIComponent(prefix);
            var vol = selectedVolumeId();
            if (vol) url += '&volume=' + encodeURIComponent(vol);
            fetch(url)
                .then(function(r) { return r.ok ? r.json() : []; })
                .then(function(items) {
                    // Only render if the input still matches what we asked
                    // for — avoids late responses overwriting fresher ones.
                    if (pathInput.value !== prefix) return;
                    renderPathSuggestions(items);
                })
                .catch(function() { hidePathAc(); });
        }

        function schedulePathFetch(prefix) {
            if (debounceTimer) clearTimeout(debounceTimer);
            debounceTimer = setTimeout(function() {
                fetchPathSuggestions(prefix);
            }, 120);
        }

        pathInput.addEventListener('input', function() {
            schedulePathFetch(this.value);
        });

        pathInput.addEventListener('focus', function() {
            // Show suggestions immediately on focus (even with an empty
            // value) so users can browse the path tree from scratch.
            lastQuery = null;
            fetchPathSuggestions(this.value);
        });

        pathInput.addEventListener('blur', function() {
            // Delay hide so an onmousedown on a suggestion can still fire.
            setTimeout(hidePathAc, 150);
        });

        pathInput.addEventListener('keydown', function(e) {
            var items = pathAc.querySelectorAll('.tag-suggestion');
            var open = pathAc.style.display === 'block' && items.length > 0;
            if (e.key === 'ArrowDown' && open) {
                e.preventDefault();
                pathAcIndex = Math.min(pathAcIndex + 1, items.length - 1);
                highlightPathAc(pathAcIndex);
            } else if (e.key === 'ArrowUp' && open) {
                e.preventDefault();
                pathAcIndex = Math.max(pathAcIndex - 1, 0);
                highlightPathAc(pathAcIndex);
            } else if ((e.key === 'Tab' || e.key === 'Enter') && open && pathAcIndex >= 0) {
                // Tab = accept current highlight, stay in field (shell-style).
                // Enter = accept current highlight too; if it's a directory
                // completion, the `/` is already in place for the next level.
                e.preventDefault();
                acceptPathSuggestion(items[pathAcIndex].getAttribute('data-path'));
            } else if (e.key === 'Enter' && !open) {
                // No open suggestions — let Enter commit the filter change.
                onFilterChange();
            } else if (e.key === 'Escape' && open) {
                e.preventDefault();
                hidePathAc();
            }
            e.stopPropagation();
        });
        pathInput.addEventListener('keyup', function(e) { e.stopPropagation(); });
    })();
})();
</script>
